name: Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npx prettier --check "src/**/*.{ts,tsx,json}"

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Type check
        run: npx tsc --noEmit
